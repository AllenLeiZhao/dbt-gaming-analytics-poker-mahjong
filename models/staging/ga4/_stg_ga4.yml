models:
  - name: stg_ga4__events
    description: "Cleaned and flattened GA4 event data for Poker Mahjong"
    columns:
      - name: event_date
        description: "Date of the event in YYYYMMDD format"
        data_tests:
          - not_null
      - name: user_pseudo_id
        description: "Pseudo user ID assigned by GA4"
        data_tests:
          - not_null
      - name: event_name
        description: "Name of the GA4 event"
        data_tests:
          - not_null